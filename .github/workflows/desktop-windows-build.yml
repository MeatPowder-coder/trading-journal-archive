name: Desktop Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-windows-build.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/desktop/package-lock.json"

      - name: Install Desktop Dependencies
        run: npm ci --prefix apps/desktop

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Desktop App (Tauri)
        run: npm --prefix apps/desktop run tauri:build

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trading-journal-desktop-windows
          if-no-files-found: warn
          path: |
            apps/desktop/src-tauri/target/release/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
