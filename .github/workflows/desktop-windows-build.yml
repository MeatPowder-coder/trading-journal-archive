name: Desktop Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "packages/journal-data/**"
      - "packages/journal-ui/**"
      - ".github/workflows/desktop-windows-build.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Desktop App (Tauri)
        run: pnpm --filter trading-journal-desktop tauri:build

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trading-journal-desktop-windows
          if-no-files-found: warn
          path: |
            apps/desktop/src-tauri/target/release/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
